apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-notification-service
  labels:
    app: payment-notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-notification-service
  template:
    metadata:
      labels:
        app: payment-notification-service
    spec:
      containers:
      - name: payment-notification-service
        image: smart-healthcare/payment-notification-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5005
          name: http
        env:
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: mongodb_uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: jwt_secret
        - name: PORT
          value: "5005"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: smtp_host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: smtp_port
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: smtp_user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: smtp_pass
        - name: CONSULTATION_SERVICE_URL
          value: "http://consultation-service:5004"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:3002"
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-notification-service
  labels:
    app: payment-notification-service
spec:
  type: ClusterIP
  selector:
    app: payment-notification-service
  ports:
  - port: 5005
    targetPort: 5005
    protocol: TCP
    name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
data:
  mongodb_uri: "mongodb://mongodb:27017/payment_notification_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
type: Opaque
stringData:
  jwt_secret: "your_payment_service_secret_change_this_in_production"
  smtp_host: "smtp.gmail.com"
  smtp_port: "587"
  smtp_user: "your-email@gmail.com"
  smtp_pass: "your-app-password"
